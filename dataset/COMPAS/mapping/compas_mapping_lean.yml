prefixes:
  ex: "http://example.org/compas/"
  schema: "http://schema.org/"
  foaf: "http://xmlns.com/foaf/0.1/"
  xsd: "http://www.w3.org/2001/XMLSchema#"

mappings:
  person:
    sources:
      - ["{counterfactual_row}~csv"]
    s: http://example.org/compas/Person_$(cf_id)~iri
    po:
      - [a, schema:Person]
      - [schema:age, $(age), xsd:integer]
      - [schema:gender, $(sex), xsd:string]
      - [ex:race, $(race), xsd:string]
      - [ex:priorsCount, $(priors_count), xsd:integer]
      - [ex:chargeDegree, $(c_charge_degree), xsd:string]
      - [ex:juvFelonyCount, $(juv_fel_count), xsd:integer]
      - [ex:juvMisdemeanorCount, $(juv_misd_count), xsd:integer]
      - [ex:juvOtherCount, $(juv_other_count), xsd:integer]
      - [ex:daysB_screeningArrest, $(days_b_screening_arrest), xsd:integer]
      - [ex:lengthOfStay, $(length_of_stay), xsd:integer]
      - [ex:ageCat, $(age_cat), xsd:string]
      - [ex:decileScore, $(decile_score), xsd:integer]
      - [ex:scoreText, $(score_text), xsd:string]
      - [ex:recidivism, $(recidivism), xsd:boolean]
      - [ex:predictedRecidivism, $(predicted_recidivism), xsd:boolean]
      - [ex:isCounterfactual, $(is_cf), xsd:boolean]
      # Original values (only for CFs)
      - [ex:originalAge, $(original_age), xsd:integer]
      - [ex:originalPriorsCount, $(original_priors_count), xsd:integer]
      - [ex:originalJuvFelonyCount, $(original_juv_fel_count), xsd:integer]
      - [ex:originalJuvMisdemeanorCount, $(original_juv_misd_count), xsd:integer]
      - [ex:originalJuvOtherCount, $(original_juv_other_count), xsd:integer]
      - [ex:originalDaysB_screeningArrest, $(original_days_b_screening_arrest), xsd:integer]
      - [ex:originalLengthOfStay, $(original_length_of_stay), xsd:integer]
      - [ex:originalGender, $(original_sex), xsd:string]
      - [ex:originalRace, $(original_race), xsd:string]
      - [ex:originalPriorsOrdinal, $(original_priors_ordinal), xsd:integer]
      - [ex:newPriorsOrdinal, $(new_priors_ordinal), xsd:integer]
      - [ex:numberOfChangedFeatures, $(num_changed_features), xsd:integer]
    condition:
      function: equal
      parameters:
        - [str1, $(is_cf)]
        - [str2, "1"]

  original_person:
    sources:
      - ["{counterfactual_row}~csv"]
    s: http://example.org/compas/Person_$(cf_id)~iri
    po:
      - [a, schema:Person]
      - [schema:age, $(age), xsd:integer]
      - [schema:gender, $(sex), xsd:string]
      - [ex:race, $(race), xsd:string]
      - [ex:priorsCount, $(priors_count), xsd:integer]
      - [ex:chargeDegree, $(c_charge_degree), xsd:string]
      - [ex:juvFelonyCount, $(juv_fel_count), xsd:integer]
      - [ex:juvMisdemeanorCount, $(juv_misd_count), xsd:integer]
      - [ex:juvOtherCount, $(juv_other_count), xsd:integer]
      - [ex:daysB_screeningArrest, $(days_b_screening_arrest), xsd:integer]
      - [ex:lengthOfStay, $(length_of_stay), xsd:integer]
      - [ex:ageCat, $(age_cat), xsd:string]
      - [ex:decileScore, $(decile_score), xsd:integer]
      - [ex:scoreText, $(score_text), xsd:string]
      - [ex:recidivism, $(recidivism), xsd:boolean]
      - [ex:predictedRecidivism, $(predicted_recidivism), xsd:boolean]
      - [ex:isCounterfactual, $(is_cf), xsd:boolean]
    condition:
      function: equal
      parameters:
        - [str1, $(is_cf)]
        - [str2, "0"]