dataset_name: "german-credit"
source_type: "openml"
openml_name: "credit-g"
openml_version: 1
target: "class"
target_undesired: "bad"
target_desired: "good"

features:
  continuous:
    - "duration"
    - "credit_amount"
    - "installment_rate"
    - "residence_since"
    - "age"
    - "existing_credits"
    - "num_dependents"
  categorical:
    - "checking_status"
    - "credit_history"
    - "purpose"
    - "savings_status"
    - "employment"
    - "personal_status"
    - "other_debtors"
    - "property_magnitude"
    - "other_payment_plans"
    - "housing"
    - "job"
    - "own_telephone"
    - "foreign_worker"

immutable_attributes:
  - "personal_status"
  - "foreign_worker"
  - "num_dependents"

cost_weights:
  credit_amount: 2.0
  duration: 2.0
  installment_rate: 3.0
  own_telephone: 1.0
  savings_status: 5.0
  checking_status: 4.0
  employment: 5.0
  existing_credits: 3.0
  residence_since: 4.0
  housing: 3.0
  job: 3.0
  property_magnitude: 4.0
  other_debtors: 3.0
  other_payment_plans: 3.0
  credit_history: 5.0
  purpose: 2.0
  default: 1.0

ordinal_mappings:
  employment:
    unemployed: 1
    unemp: 1
    "<1": 2
    "less than 1 year": 2
    "1<=x<4": 3
    "1<x<4": 3
    "4<=x<7": 4
    "4<x<7": 4
    ">=7": 5
    "7+": 5
  savings_status:
    "no known savings": 0
    "unknown": 0
    "<100": 1
    "100<=x<500": 2
    "500<=x<1000": 3
    ">=1000": 4
  checking_status:
    "no checking": 0
    "<0": 1
    "0<=x<200": 2
    ">=200": 3

artifact_paths:
  ontology: "ontology/credit_ontology.ttl"
  shacl: "shacl/shacl_rules.ttl"
  rml: "mapping/cf_mapping.yml"

action_rules:
  stable_attributes: ["personal_status", "foreign_worker", "num_dependents"]
  flexible_attributes: []
  min_support: 0.02
  min_confidence: 0.6
  min_stable: 1
  min_flexible: 1

# DiCE specific permitted ranges (optional)
dice_permitted_range:
  credit_amount: [500, 10000]
  duration: [6, 48]
  installment_rate: [1, 4]

preprocessing:
  method: "dummy"        # no scaling, just one‑hot encoding
  stratify: false