prefixes:
  schema: "https://schema.org/"
  foaf: "http://xmlns.com/foaf/0.1/"
  ex: "http://example.org/credit/"
  rdf: "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  xsd: "http://www.w3.org/2001/XMLSchema#"

mappings:
  credit_application:
    sources:
      - ["{counterfactual_row}"]
    s: "ex:Loan_$(cf_id)"
    po:
      - [rdf:type, ex:CreditApplication]
      - [rdf:type, ex:CounterfactualApplication]
      - [rdf:type, schema:LoanOrCredit]
      - [schema:borrower, "ex:Person_$(cf_id)~iri"]
      - [schema:value, "$(credit_amount)", xsd:integer]
      - [schema:numberOfLoanPayments, "$(duration)", xsd:integer]
      - [schema:annualPercentageRate, "$(installment_rate)", xsd:integer]
      - [schema:numberOfCredits, "$(existing_credits)", xsd:integer]
      - [ex:checkingStatus, "$(checking_status)"]
      - [ex:creditHistory, "$(credit_history)"]
      - [ex:loanPurpose, "$(purpose)"]
      - [ex:savingsStatus, "$(savings_status)"]
      - [ex:otherDebtors, "$(other_debtors)"]
      - [ex:otherInstallmentPlans, "$(other_payment_plans)"]
      - [ex:housingStatus, "$(housing)"]
      # Original values for comparison
      - [ex:originalAmount, "$(original_credit_amount)", xsd:integer]
      - [ex:originalDuration, "$(original_duration)", xsd:integer]
      - [ex:originalChecking, "$(original_checking_status)"]
      - [ex:originalCheckingOrdinal, "$(original_checking_ordinal)", xsd:integer]
      - [ex:newCheckingOrdinal, "$(new_checking_ordinal)", xsd:integer]
      - [ex:originalSavings, "$(original_savings_status)"]
      - [ex:originalSavingsOrdinal, "$(original_savings_ordinal)", xsd:integer]
      - [ex:newSavingsOrdinal, "$(new_savings_ordinal)", xsd:integer]
      - [ex:numberOfChangedFeatures, "$(num_changed_features)", xsd:integer]

  person:
    sources:
      - ["{counterfactual_row}"]
    s: "ex:Person_$(cf_id)"
    po:
      - [rdf:type, foaf:Person]
      - [foaf:age, "$(age)", xsd:integer]
      - [schema:numberOfItems, "$(num_dependents)", xsd:integer]
      - [ex:employmentSince, "$(employment)"]
      - [ex:personalStatus, "$(personal_status)"]
      - [ex:jobLevel, "$(job)"]
      - [ex:hasTelephone, "$(own_telephone)", xsd:boolean]
      - [ex:isForeignWorker, "$(foreign_worker)", xsd:boolean]
      - [ex:residenceSince, "$(residence_since)", xsd:integer]
      - [ex:propertyAsset, "$(property_magnitude)"]
      # Original values for comparison
      - [ex:originalAge, "$(original_age)", xsd:integer]
      - [ex:originalNumDependents, "$(original_num_dependents)", xsd:integer]
      - [ex:originalEmployment, "$(original_employment)"]
      - [ex:originalEmploymentOrdinal, "$(original_employment_ordinal)", xsd:integer]
      - [ex:newEmploymentOrdinal, "$(new_employment_ordinal)", xsd:integer]
      - [ex:originalPersonalStatus, "$(original_personal_status)"]
      - [ex:originalForeignWorker, "$(original_foreign_worker)", xsd:boolean]
